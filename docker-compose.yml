services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
      POSTGRES_DB: archive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive -d archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.example
      - path: .env
        required: false
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
